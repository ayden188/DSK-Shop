<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSK Shop | Mode & Lifestyle</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>




    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'dsk-text': 'var(--text-main)',
                        'dsk-bg': 'var(--bg-body)',
                        'dsk-card': 'var(--bg-card)',
                        'dsk-white-var': 'var(--dsk-white)',
                        'dsk-primary': '#caa52b',
                        'dsk-accent': '#f51924',
                    },
                    fontFamily: {
                        'sans': ['Inter', 'sans-serif'],
                        'title': ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --text-main: #080808;
            --bg-body: #f8fafc   ;
            --bg-card: #ffffff;
            --dsk-white: #ffffff;
        }

        .dark {
            --text-main: #ffffff;
            --bg-body: #080808;
            --bg-card: #111111;
            --dsk-white: #080808;
            /* Ta variable blanc devient noire ici ! */
        }

        /* Transition fluide pour le confort */
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>


    <header class="relative w-full h-[600px] overflow-hidden">
    <nav class="fixed top-0 left-1/2 -translate-x-1/2 z-50 w-[100%] md:w-[90%] max-w-[1400px] flex justify-between items-center p-4 bg-white/90 backdrop-blur-md md:rounded-b-2xl shadow-sm">        
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center">
                <i data-lucide="zap" class="text-white w-5 h-5"></i>
            </div>
            <span class="font-bold text-xl tracking-tight">DSK SHOP</span>
        </div>

        <ul class="hidden md:flex gap-10 font-bold text-gray-500">
            <li><a href="shop.html" class="hover:text-black">Shop</a></li>
            <li><a href="#" class="text-black border-b-2 border-black pb-1">Home</a></li>
            <li><a href="#" class="hover:text-black">Blog</a></li>
        </ul>

        <div class="flex items-center gap-3">
            <button class="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="search" class="w-5 h-5"></i></button>
            <button onclick="ouvrirPanier(); " class="relative p-2 hover:bg-gray-100 rounded-full">
                <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                <span class="absolute top-1 right-1 h-4 w-4 bg-red-500 text-white text-[10px] flex items-center justify-center rounded-full" id="span">0</span>
            </button>
            <img src="https://ui-avatars.com/api/?name=DSK" class="w-9 h-9 rounded-full border">
        </div>

    </nav>
    </header>
    
<main class="grid grid-cols-12"></main>



        
    <footer class="p-10 text-black bg-black ">
        <section class="flex flex-col md:flex-row justify-between mt-8 items-start gap-8">
            <div class="flex gap-16">
                <div>
                    <h1 class="font-black mb-4 md:text-2xl text-white ">About</h1>
                    <ul class="flex flex-col gap-2 text-gray-500 font-bold">
                        <li class="hover:text-black cursor-pointer transition-colors duration-300">Blog</li>
                        <li class="hover:text-black cursor-pointer transition-colors duration-300">Meet The Team</li>
                        <li class="hover:text-black cursor-pointer transition-colors duration-300">Contact Us</li>
                    </ul>
                </div>
                <div>
                    <h1 class="font-black text-sm mb-4 md:text-2xl text-white">Support</h1>
                    <ul class="flex flex-col gap-2 text-gray-500 font-bold">
                        <li class="hover:text-black cursor-pointer transition-colors duration-300">Shipping</li>
                        <li class="hover:text-black cursor-pointer transition-colors duration-300">Return</li>
                        <li class="hover:text-black cursor-pointer transition-colors duration-300">FAQ</li>
                    </ul>
                </div>
            </div>
    
            <div class="flex flex-col gap-6 items-end  mt-auto">
                <h1 class="text-white font-black text-gray-500 md:text-right">Social Media</h1>
                <div class="flex gap-3">
                    <a href="#" class="p-2 bg-black text-white  rounded-full hover:bg-pink-600 transition-all duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/>
                        </svg>
                    </a>
                    <a href="#" class="p-2 bg-black text-white  rounded-full hover:bg-blue-700 transition-all duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
                        </svg>
                    </a>
                    <a href="#" class="p-2 bg-black text-white  rounded-full hover:bg-gray-800 transition-all duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/>
                        </svg>
                    </a>
                    <a href="#" class="p-2 bg-black text-white  rounded-full hover:bg-green-500 transition-all duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                        </svg>
                    </a>
                </div>
            </div>
        </section>
    
    </footer>

      <div id="side-cart" class="fixed top-0 right-0 h-full w-[350px] bg-white shadow-2xl z-[100] translate-x-full transition-transform duration-500 ease-in-out p-6">
        <div class="flex justify-between items-center border-b pb-4">
            <h2 class="text-xl font-black">Mon Panier</h2>
            <button onclick="fermerPanier()" class="p-2 hover:bg-gray-100 rounded-full">
                <i data-lucide="x"></i>
            </button>
        </div>
    
        <div id="cart-content" class="mt-8 space-y-4 flex flex-col items-center justify-center text-gray-400">
            <h3 class="flex justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="58" height="58" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart">
                    <circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/>
                    <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
                </svg>
            </h3>
            <p class="text-center font-black">Votre panier est vide.</p>
        </div>
    </div>
<script type="module" src="carte.js"></script>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
