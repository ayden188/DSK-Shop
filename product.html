<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | DSK Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .font-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-white text-[#1d1d1f]">
    <div class="main-content">
<nav class="fixed top-0 left-1/2 -translate-x-1/2 z-50 w-[100%] md:w-[90%] max-w-[1400px] flex justify-between items-center p-4 bg-white/90 backdrop-blur-md md:rounded-b-2xl shadow-sm">        
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center">
                <i data-lucide="zap" class="text-white w-5 h-5"></i>
            </div>
            <span class="font-bold text-xl tracking-tight">DSK SHOP</span>
        </div>

        <ul class="hidden md:flex gap-10 font-bold text-gray-500">
            <li><a href="shop.html" class="hover:text-black ">Shop</a></li>
            <li><a href="index.html" class="hover:text-black">Home</a></li>
            <li><a href="#" class="hover:text-black">Blog</a></li>
        </ul>

        <div class="flex items-center gap-3">
            <button class="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="search" class="w-5 h-5"></i></button>
            <button onclick="ouvrirPanier(); " class="relative p-2 hover:bg-gray-100 rounded-full">
                <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                <span class="absolute top-1 right-1 h-4 w-4 bg-red-500 text-white text-[10px] flex items-center justify-center rounded-full" id="span">0</span>
            </button>
            <img src="https://ui-avatars.com/api/?name=DSK" class="w-9 h-9 rounded-full border">
        </div>

    </nav>


<main class="max-w-6xl mx-auto px-4 py-8 mt-4 md:py-16 mt-8">
    
<nav class="flex items-center gap-3 text-sm mb-8">
    <a href="index.html" class="text-gray-400 font-black hover:text-black transition-colors duration-200">
        Home
    </a>
    
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-300">
        <path d="m9 18 6-6-6-6"/>
    </svg>
    
    <span class="text-gray-500 font-medium cursor-pointer font-black ">
        Product
    </span>
</nav>
    <div class="flex flex-col md:flex-row md:items-stretch gap-10 md:gap-20 mt-8">
        
        <div class="md:w-1/2  md:flex-1 flex items-center justify-center">
            <div class="sticky top-28 bg-[#f5f5f7] rounded-[14px] overflow-hidden flex items-center justify-center shadow-inner w-full  h-full">
                <img id="product-img" src="" alt="Loading..."
                    class="w-3/4 h-3/4 object-contain object-center transition-transform duration-700 hover:scale-105">
            </div>
        </div>

        <div class="md:w-1/2 md:flex-1 flex flex-col justify-between pt-4 md:pt-0">
            <div>
                <div class="space-y-1">
                    <span id="product-cat" class="text-[10px] md:text-xs font-bold text-[#caa52b] uppercase tracking-[0.2em]">Category</span>
                    <h1 id="product-name" class="font-title text-2xl md:text-4xl font-extrabold tracking-tight text-black leading-snug">
                        Loading...
                    </h1>
                    
                    <div class="flex items-center gap-3 pt-3">
                        <span id="product-price" class="text-xl md:text-2xl font-bold text-black">0.00 XOF</span>
                        <span id="product-status" class="border border-green-200 text-green-700 text-[10px] font-black px-2 py-0.5 rounded-full uppercase">In Stock</span>
                    </div>
                </div>

                <div class="mt-8 pt-8 border-t border-gray-100">
                    <h3 class="font-bold text-xs uppercase tracking-wider mb-2 text-gray-700">Description</h3>
                    <p id="product-desc" class="text-gray-600 leading-relaxed text-sm">
                        Detailed description will appear here...
                    </p>
                </div>
            </div>

            <div class="mt-auto space-y-5 pt-8">
                <div class="flex flex-col sm:flex-row gap-4">
                    <a id="wa-btn" href="#" target="_blank"
                        class="flex-1 bg-black text-white text-xs py-3.5 rounded-xl font-bold hover:bg-[#caa52b] transition-all flex items-center justify-center gap-2.5 shadow-xl shadow-black/5">
                        <i data-lucide="message-circle" class="w-4 h-4"></i>
                        Order via WhatsApp
                    </a>

                    <button class="flex-1 border-2 border-black py-3.5 rounded-xl text-xs font-bold hover:bg-gray-50 transition-all flex items-center justify-center gap-2.5">
                        <i data-lucide="shopping-bag" class="w-4 h-4"></i>
                        Add to Cart
                    </button>
                </div>

                <div class="flex flex-wrap items-center justify-center md:justify-start gap-5 pt-1 text-gray-500">
                    <div class="flex items-center gap-1.5 text-[10px] font-medium uppercase">
                        <i data-lucide="truck" class="w-3.5 h-3.5 text-[#caa52b]"></i>
                        Express Shipping
                    </div>
                    <div class="flex items-center gap-1.5 text-[10px] font-medium uppercase">
                        <i data-lucide="shield-check" class="w-3.5 h-3.5 text-[#caa52b]"></i>
                        Cash on Delivery
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>



    <script type="module" src="carte.js"></script>
    
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
